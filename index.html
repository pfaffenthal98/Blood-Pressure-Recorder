<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressometro / Blood Pressure Tracker</title>
<style>
  :root{
    --black:#111111;
    --cream:#FFF7E0;
    --yellow:#FFD400;
    --pink:#FF4FA0;
    --blue:#3E7BFA;
    --green:#33D17A;
    --red:#FF4136;
    --shadow-off: 6px 6px 0 var(--black);
    --shadow-off-sm: 4px 4px 0 var(--black);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background:var(--cream);
    background-image:
      radial-gradient(circle, rgba(17,17,17,0.06) 1.5px, transparent 1.5px);
    background-size: 22px 22px;
    font-family: 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color:var(--black);
    padding: 24px;
  }

  h1,h2,h3{ margin:0; text-transform:uppercase; letter-spacing:-0.5px; }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:28px;
    border:4px solid var(--black);
    background:var(--yellow);
    box-shadow: var(--shadow-off);
    padding: 18px 24px;
  }

  .topbar h1{ font-size: clamp(1.4rem, 3.5vw, 2.2rem); }
  .topbar .sub{ font-weight:normal; font-family: Arial, sans-serif; font-size:0.85rem; margin-top:4px; }

  .btn{
    font-family:inherit;
    font-weight:bold;
    text-transform:uppercase;
    border:4px solid var(--black);
    background:var(--black);
    color:var(--cream);
    padding: 12px 20px;
    cursor:pointer;
    box-shadow: var(--shadow-off-sm);
    transition: transform .08s ease;
    font-size:0.95rem;
    white-space:nowrap;
  }
  .btn:active{ transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--black); }
  .btn.primary{ background:var(--pink); color:var(--black); }
  .btn.secondary{ background:var(--cream); color:var(--black); }
  .btn.danger{ background:var(--red); color:var(--cream); }

  .stats-row{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap:18px;
    margin-bottom: 24px;
  }
  .stat-card{
    border:4px solid var(--black);
    background:white;
    box-shadow: var(--shadow-off);
    padding: 16px 18px;
  }
  .stat-card .label{
    font-size:0.75rem;
    font-family:Arial, sans-serif;
    font-weight:bold;
    text-transform:uppercase;
    opacity:0.7;
    margin-bottom:6px;
  }
  .stat-card .value{
    font-size:2.1rem;
    line-height:1;
  }
  .stat-card .unit{ font-size:1rem; opacity:0.6; }
  .stat-card.sys{ border-left:10px solid var(--pink); }
  .stat-card.dia{ border-left:10px solid var(--blue); }
  .stat-card.hr{ border-left:10px solid var(--green); }
  .stat-card.days{ border-left:10px solid var(--black); }

  .panel{
    border:4px solid var(--black);
    background:white;
    box-shadow: var(--shadow-off);
    margin-bottom: 28px;
    padding: 20px;
  }
  .panel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
    flex-wrap:wrap;
    gap:10px;
  }

  .legend{ display:flex; gap:16px; font-family:Arial, sans-serif; font-size:0.8rem; font-weight:bold; flex-wrap:wrap; }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .legend i{ width:14px; height:14px; display:inline-block; border:2px solid var(--black); }

  .empty-state{
    text-align:center;
    padding: 40px 20px;
    font-family:Arial, sans-serif;
  }
  .empty-state .big{ font-size:2.5rem; margin-bottom:10px; }

  .table-wrap{
    max-height: 480px;
    overflow-y:auto;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    border:3px solid var(--black);
  }
  table{ width:100%; min-width:640px; border-collapse:collapse; font-family: Arial, sans-serif; }
  thead th{
    position: sticky;
    top:0;
    background:var(--black);
    color:var(--cream);
    text-align:left;
    padding: 12px 10px;
    font-size:0.78rem;
    text-transform:uppercase;
    letter-spacing:0.5px;
    z-index:2;
    border-bottom:3px solid var(--black);
  }
  tbody td{
    padding: 12px 10px;
    border-bottom: 2px solid #eee;
    font-size:0.92rem;
  }
  tbody tr:hover{ background: #FFF3B0; }
  tbody tr:nth-child(even){ background: #FAFAFA; }
  tbody tr:nth-child(even):hover{ background: #FFF3B0; }

  .badge{
    display:inline-block;
    padding: 3px 8px;
    border:2px solid var(--black);
    font-weight:bold;
    font-size:0.8rem;
  }
  .badge.high{ background:var(--red); color:white; }
  .badge.ok{ background:var(--green); color:black; }

  .icon-btn{
    border:2px solid var(--black);
    background:white;
    width:34px; height:34px;
    cursor:pointer;
    font-size:1rem;
    margin-right:6px;
    box-shadow: 3px 3px 0 var(--black);
  }
  .icon-btn:active{ transform: translate(2px,2px); box-shadow:none; }
  .icon-btn.edit:hover{ background:var(--yellow); }
  .icon-btn.del:hover{ background:var(--red); color:white; }

  html, body{ overflow-x:hidden; max-width:100%; }

  input, select, textarea{ min-width:0; max-width:100%; }

  /* Modal */
  .overlay{
    position:fixed; inset:0;
    background: rgba(17,17,17,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:var(--cream);
    border:4px solid var(--black);
    box-shadow: 10px 10px 0 var(--black);
    padding: 26px;
    width: 100%;
    max-width: 420px;
    max-height: 85vh;
    max-height: 85dvh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    box-sizing:border-box;
    margin: auto;
  }
  .modal h2{ margin-bottom: 18px; font-size:1.3rem; }
  .modal.confirm h2{ color: var(--red); }

  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-family:Arial, sans-serif;
    font-weight:bold;
    font-size:0.8rem;
    text-transform:uppercase;
    margin-bottom:5px;
  }
  .field input{
    width:100%;
    border:3px solid var(--black);
    padding:10px 12px;
    font-size:1rem;
    font-family:Arial, sans-serif;
    background:white;
  }
  .field input:focus{ outline:none; background:#FFF3B0; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .modal .btn{ white-space:normal; text-align:center; }

  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:20px;
  }

  footer.hint{
    font-family:Arial, sans-serif;
    font-size:0.75rem;
    opacity:0.6;
    text-align:center;
    margin-top: 10px;
  }

  .table-scroll-hint{
    display:none;
    font-family:Arial, sans-serif;
    font-size:0.75rem;
    opacity:0.65;
    margin-bottom:8px;
  }
  @media (max-width:680px){
    .table-scroll-hint{ display:block; }
  }

  @media (max-width:520px){
    .row2{ grid-template-columns:1fr; }
    body{ padding:14px; }
    .overlay{ align-items:flex-start; padding: 16px 12px 40px; }
    .modal{ max-height: none; padding: 20px; }
    .share-box{ flex-direction:column; }
    .share-box input{ font-size:0.72rem; }
  }

  .header-actions{ display:flex; gap:10px; flex-wrap:wrap; }

  .share-box{
    display:flex;
    gap:8px;
    align-items:stretch;
    margin-bottom:10px;
  }
  .share-box input{
    flex:1;
    border:3px solid var(--black);
    padding:10px 12px;
    font-family: monospace;
    font-size:0.8rem;
    background:#f5f5f5;
    word-break: break-all;
  }
  .share-meta{
    font-family:Arial, sans-serif;
    font-size:0.78rem;
    opacity:0.75;
    margin-top:6px;
  }
  .share-meta.warn{ color:var(--red); opacity:1; font-weight:bold; }

  .toast{
    position:fixed;
    left:50%;
    bottom:24px;
    transform: translateX(-50%) translateY(20px);
    background:var(--black);
    color:var(--cream);
    border:3px solid var(--black);
    box-shadow: 6px 6px 0 rgba(0,0,0,0.35);
    padding: 12px 20px;
    font-family:Arial, sans-serif;
    font-weight:bold;
    font-size:0.9rem;
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition: opacity .2s ease, transform .2s ease;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); pointer-events:auto; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1 id="t_title">🩺 Pressometro</h1>
    <div class="sub" id="t_subtitle">Registro pressione e battiti — i dati restano solo su questo dispositivo</div>
  </div>
  <div class="header-actions">
    <button class="btn secondary" id="btnShare"></button>
    <button class="btn primary" id="btnAdd"></button>
  </div>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="panel">
  <div class="panel-head">
    <h2 id="t_chartTitle">Andamento medie giornaliere</h2>
    <div class="legend">
      <span><i style="background:var(--pink)"></i><span id="t_legendSys"></span></span>
      <span><i style="background:var(--blue)"></i><span id="t_legendDia"></span></span>
      <span><i style="background:var(--green)"></i><span id="t_legendHr"></span></span>
    </div>
  </div>
  <div id="chartHolder"></div>
</div>

<div class="panel">
  <div class="panel-head">
    <h2 id="t_historyTitle">Storico misurazioni</h2>
  </div>
  <div class="table-scroll-hint" id="t_scrollHint"></div>
  <div id="tableHolder"></div>
</div>

<footer class="hint" id="t_footer"></footer>

<!-- Add/edit modal -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <h2 id="formTitle"></h2>
    <form id="measureForm">
      <input type="hidden" id="editId">
      <div class="field">
        <label for="fDate" id="t_lblDate">Data</label>
        <input type="date" id="fDate" required>
      </div>
      <div class="field">
        <label for="fTime" id="t_lblTime">Ora</label>
        <input type="time" id="fTime" required>
      </div>
      <div class="row2">
        <div class="field">
          <label for="fSys" id="t_lblSys">Sistolica (max)</label>
          <input type="number" id="fSys" min="50" max="300" required inputmode="numeric" pattern="[0-9]*">
        </div>
        <div class="field">
          <label for="fDia" id="t_lblDia">Diastolica (min)</label>
          <input type="number" id="fDia" min="30" max="200" required inputmode="numeric" pattern="[0-9]*">
        </div>
      </div>
      <div class="field">
        <label for="fHr" id="t_lblHr">Battiti (bpm)</label>
        <input type="number" id="fHr" min="20" max="250" required inputmode="numeric" pattern="[0-9]*">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn secondary" id="btnCancelForm"></button>
        <button type="submit" class="btn primary" id="btnSaveForm"></button>
      </div>
    </form>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="overlay" id="deleteOverlay">
  <div class="modal confirm">
    <h2 id="t_deleteTitle"></h2>
    <p style="font-family:Arial, sans-serif;" id="t_deleteBody"></p>
    <div class="modal-actions">
      <button type="button" class="btn secondary" id="btnCancelDelete"></button>
      <button type="button" class="btn danger" id="btnConfirmDelete"></button>
    </div>
  </div>
</div>

<!-- Share modal -->
<div class="overlay" id="shareOverlay">
  <div class="modal">
    <h2 id="t_shareTitle"></h2>
    <p class="share-meta" id="t_shareDesc" style="margin-bottom:12px;"></p>
    <div class="share-box">
      <input type="text" id="shareUrlInput" readonly>
      <button type="button" class="btn primary" id="btnCopyShare"></button>
    </div>
    <div class="share-meta" id="shareCharCount"></div>
    <div class="modal-actions">
      <button type="button" class="btn secondary" id="btnCloseShare"></button>
    </div>
  </div>
</div>

<!-- Import conflict modal -->
<div class="overlay" id="importOverlay">
  <div class="modal confirm">
    <h2 id="t_importTitle"></h2>
    <p style="font-family:Arial, sans-serif;" id="t_importBody"></p>
    <div class="modal-actions">
      <button type="button" class="btn secondary" id="btnKeepMine"></button>
      <button type="button" class="btn danger" id="btnOverwriteMine"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'pressometro_misurazioni_v1';

/* ---------------- i18n ---------------- */
const LANG = (navigator.language || navigator.userLanguage || 'en').toLowerCase().startsWith('it') ? 'it' : 'en';
document.documentElement.lang = LANG;

const STRINGS = {
  it: {
    pageTitle: 'Pressometro — Monitoraggio Pressione e Battiti',
    title: '🩺 Pressometro',
    subtitle: 'Registro pressione e battiti — i dati restano solo su questo dispositivo',
    addBtn: '+ Aggiungi misurazione',
    chartTitle: 'Andamento medie giornaliere',
    legendSys: 'Sistolica',
    legendDia: 'Diastolica',
    legendHr: 'Battiti',
    historyTitle: 'Storico misurazioni',
    footer: 'Dati salvati in localStorage del browser. Cancellando i dati di navigazione perderai lo storico.',
    lblDate: 'Data', lblTime: 'Ora', lblSys: 'Sistolica (max)', lblDia: 'Diastolica (min)', lblHr: 'Battiti (bpm)',
    phSys: 'es. 120', phDia: 'es. 80', phHr: 'es. 70',
    formTitleNew: 'Nuova misurazione',
    formTitleEdit: 'Modifica misurazione',
    cancel: 'Annulla',
    save: 'Salva',
    deleteTitle: 'Eliminare questa misurazione?',
    deleteBody: "L'operazione non è reversibile.",
    delete: 'Elimina',
    noDataStat: 'Nessun dato ancora',
    statSys: 'La tua media sistolica',
    statDia: 'La tua media diastolica',
    statHr: 'I tuoi battiti medi',
    statDays: 'Giorni monitorati',
    unitMmhg: 'mmHg',
    unitBpm: 'bpm',
    chartEmpty: 'Ancora nessuna misurazione registrata.<br>Aggiungine una per vedere il grafico.',
    tableEmpty: 'Nessuna misurazione registrata.<br>Premi "Aggiungi misurazione" per iniziare.',
    thDate: 'Data', thTime: 'Ora', thSys: 'Sist.', thDia: 'Diast.', thHr: 'Batt.', thStatus: 'Stato', thActions: 'Azioni',
    badgeHigh: 'ALTA', badgeOk: 'OK',
    editTitle: 'Modifica', deleteIconTitle: 'Elimina',
    dateFmt: 'dmy',
    shareBtn: '🔗 Condividi',
    shareTitle: 'Condividi i tuoi dati',
    shareDesc: 'Invia questo link a un altro dispositivo o persona per trasferire lo storico.',
    copyBtn: 'Copia link',
    copiedBtn: '✓ Copiato!',
    close: 'Chiudi',
    charCount: n => `${n} caratteri nel link`,
    charWarn: 'Il link è piuttosto lungo: alcune app (SMS, alcuni browser datati) potrebbero troncarlo. Preferisci email, chat o QR code se possibile.',
    importTitle: 'Dati condivisi differenti trovati',
    importBody: (nNew, nConf) => {
      let parts = [];
      if(nNew > 0) parts.push(`${nNew} nuove misurazioni sono già state aggiunte al tuo storico.`);
      parts.push(`${nConf} misurazioni ricevute hanno data/ora uguale a misurazioni che hai già, ma valori diversi. Vuoi sovrascriverle con i valori ricevuti dal link, oppure mantenere i tuoi?`);
      return parts.join(' ');
    },
    keepMine: 'Mantieni i miei',
    overwriteMine: 'Sovrascrivi con i ricevuti',
    toastAdded: n => `${n} nuove misurazioni aggiunte dal link condiviso.`,
    toastOverwritten: n => `${n} misurazioni aggiornate con i valori ricevuti.`,
    toastKept: 'Hai mantenuto i tuoi valori originali.',
    scrollHint: '↔ Scorri lateralmente per vedere tutte le colonne'
  },
  en: {
    pageTitle: 'Blood Pressure Tracker',
    title: '🩺 Blood Pressure Tracker',
    subtitle: 'Blood pressure & heart rate log — data stays only on this device',
    addBtn: '+ Add reading',
    chartTitle: 'Daily average trend',
    legendSys: 'Systolic',
    legendDia: 'Diastolic',
    legendHr: 'Heart rate',
    historyTitle: 'Reading history',
    footer: "Data is saved in your browser's localStorage. Clearing browsing data will erase your history.",
    lblDate: 'Date', lblTime: 'Time', lblSys: 'Systolic (max)', lblDia: 'Diastolic (min)', lblHr: 'Heart rate (bpm)',
    phSys: 'e.g. 120', phDia: 'e.g. 80', phHr: 'e.g. 70',
    formTitleNew: 'New reading',
    formTitleEdit: 'Edit reading',
    cancel: 'Cancel',
    save: 'Save',
    deleteTitle: 'Delete this reading?',
    deleteBody: 'This action cannot be undone.',
    delete: 'Delete',
    noDataStat: 'No data yet',
    statSys: 'Your average systolic',
    statDia: 'Your average diastolic',
    statHr: 'Your average heart rate',
    statDays: 'Days tracked',
    unitMmhg: 'mmHg',
    unitBpm: 'bpm',
    chartEmpty: 'No readings recorded yet.<br>Add one to see the chart.',
    tableEmpty: 'No readings recorded yet.<br>Press "Add reading" to get started.',
    thDate: 'Date', thTime: 'Time', thSys: 'Sys.', thDia: 'Dia.', thHr: 'HR', thStatus: 'Status', thActions: 'Actions',
    badgeHigh: 'HIGH', badgeOk: 'OK',
    editTitle: 'Edit', deleteIconTitle: 'Delete',
    dateFmt: 'mdy',
    shareBtn: '🔗 Share',
    shareTitle: 'Share your data',
    shareDesc: 'Send this link to another device or person to transfer the history.',
    copyBtn: 'Copy link',
    copiedBtn: '✓ Copied!',
    close: 'Close',
    charCount: n => `${n} characters in the link`,
    charWarn: 'This link is quite long: some apps (SMS, some older browsers) may truncate it. Prefer email, chat, or a QR code if possible.',
    importTitle: 'Different shared data found',
    importBody: (nNew, nConf) => {
      let parts = [];
      if(nNew > 0) parts.push(`${nNew} new readings have already been added to your history.`);
      parts.push(`${nConf} received readings share the same date/time as readings you already have, but with different values. Do you want to overwrite them with the received values, or keep yours?`);
      return parts.join(' ');
    },
    keepMine: 'Keep mine',
    overwriteMine: 'Overwrite with received',
    toastAdded: n => `${n} new readings added from the shared link.`,
    toastOverwritten: n => `${n} readings updated with received values.`,
    toastKept: 'You kept your original values.',
    scrollHint: '↔ Swipe sideways to see all columns'
  }
};
const T = STRINGS[LANG];

function applyStaticStrings(){
  document.title = T.pageTitle;
  document.getElementById('t_title').textContent = T.title;
  document.getElementById('t_subtitle').textContent = T.subtitle;
  document.getElementById('btnAdd').textContent = T.addBtn;
  document.getElementById('t_chartTitle').textContent = T.chartTitle;
  document.getElementById('t_legendSys').textContent = T.legendSys;
  document.getElementById('t_legendDia').textContent = T.legendDia;
  document.getElementById('t_legendHr').textContent = T.legendHr;
  document.getElementById('t_historyTitle').textContent = T.historyTitle;
  document.getElementById('t_footer').textContent = T.footer;
  document.getElementById('t_lblDate').textContent = T.lblDate;
  document.getElementById('t_lblTime').textContent = T.lblTime;
  document.getElementById('t_lblSys').textContent = T.lblSys;
  document.getElementById('t_lblDia').textContent = T.lblDia;
  document.getElementById('t_lblHr').textContent = T.lblHr;
  document.getElementById('fSys').placeholder = T.phSys;
  document.getElementById('fDia').placeholder = T.phDia;
  document.getElementById('fHr').placeholder = T.phHr;
  document.getElementById('btnCancelForm').textContent = T.cancel;
  document.getElementById('btnSaveForm').textContent = T.save;
  document.getElementById('t_deleteTitle').textContent = T.deleteTitle;
  document.getElementById('t_deleteBody').textContent = T.deleteBody;
  document.getElementById('btnCancelDelete').textContent = T.cancel;
  document.getElementById('btnConfirmDelete').textContent = T.delete;

  document.getElementById('btnShare').textContent = T.shareBtn;
  document.getElementById('t_shareTitle').textContent = T.shareTitle;
  document.getElementById('t_shareDesc').textContent = T.shareDesc;
  document.getElementById('btnCopyShare').textContent = T.copyBtn;
  document.getElementById('btnCloseShare').textContent = T.close;
  document.getElementById('t_importTitle').textContent = T.importTitle;
  document.getElementById('btnKeepMine').textContent = T.keepMine;
  document.getElementById('btnOverwriteMine').textContent = T.overwriteMine;
  document.getElementById('t_scrollHint').textContent = T.scrollHint;
}

/* ---------------- Data layer ---------------- */
function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function saveData(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function uid(){ return 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

let data = loadData();
let deleteTargetId = null;

function pad(n){ return n.toString().padStart(2,'0'); }
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function nowTimeStr(){
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDateLocal(dateStr){
  const [y,m,d] = dateStr.split('-');
  return T.dateFmt === 'dmy' ? `${d}/${m}/${y}` : `${m}/${d}/${y}`;
}

/* ---------------- Aggregation ---------------- */
function dailyAverages(){
  const byDay = {};
  data.forEach(m=>{
    if(!byDay[m.date]) byDay[m.date] = {sys:[], dia:[], hr:[]};
    byDay[m.date].sys.push(m.sys);
    byDay[m.date].dia.push(m.dia);
    byDay[m.date].hr.push(m.hr);
  });
  const days = Object.keys(byDay).sort();
  return days.map(date=>{
    const g = byDay[date];
    const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
    return { date, sys: avg(g.sys), dia: avg(g.dia), hr: avg(g.hr) };
  });
}

function overallAverageOfDailyAverages(){
  const days = dailyAverages();
  if(days.length === 0) return null;
  const avg = key => days.reduce((a,d)=>a+d[key],0)/days.length;
  return { sys: avg('sys'), dia: avg('dia'), hr: avg('hr'), giorni: days.length };
}

function renderChart(){
  const holder = document.getElementById('chartHolder');
  const days = dailyAverages();

  if(days.length === 0){
    holder.innerHTML = `<div class="empty-state"><div class="big">📉</div>${T.chartEmpty}</div>`;
    return;
  }

  const shown = days.slice(-30);
  const W = 900, H = 320;
  const padL = 46, padR = 20, padT = 20, padB = 46;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const allVals = shown.flatMap(d=>[d.sys, d.dia, d.hr]);
  let minV = Math.min(...allVals, 40);
  let maxV = Math.max(...allVals, 140);
  minV = Math.floor(minV/10)*10 - 10;
  maxV = Math.ceil(maxV/10)*10 + 10;

  const xStep = shown.length > 1 ? plotW / (shown.length - 1) : 0;
  const yScale = v => padT + plotH - ((v - minV)/(maxV - minV)) * plotH;
  const xScale = i => padL + i * xStep;

  function linePath(key){
    return shown.map((d,i)=> `${i===0?'M':'L'} ${xScale(i).toFixed(1)} ${yScale(d[key]).toFixed(1)}`).join(' ');
  }
  function dots(key, color){
    return shown.map((d,i)=>
      `<circle cx="${xScale(i).toFixed(1)}" cy="${yScale(d[key]).toFixed(1)}" r="4" fill="${color}" stroke="#111" stroke-width="2"/>`
    ).join('');
  }

  let gridLines = '';
  const steps = 5;
  for(let s=0; s<=steps; s++){
    const val = minV + (maxV-minV) * s/steps;
    const y = yScale(val);
    gridLines += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#111" stroke-opacity="0.12" stroke-width="1"/>`;
    gridLines += `<text x="${padL-8}" y="${(y+4).toFixed(1)}" font-size="11" text-anchor="end" font-family="Arial, sans-serif" fill="#111">${val.toFixed(0)}</text>`;
  }

  let xLabels = '';
  const labelEvery = Math.max(1, Math.ceil(shown.length / 8));
  shown.forEach((d,i)=>{
    if(i % labelEvery === 0 || i === shown.length-1){
      const [y,m,day] = d.date.split('-');
      const lbl = T.dateFmt === 'dmy' ? `${day}/${m}` : `${m}/${day}`;
      xLabels += `<text x="${xScale(i).toFixed(1)}" y="${H-padB+20}" font-size="11" text-anchor="middle" font-family="Arial, sans-serif" fill="#111">${lbl}</text>`;
    }
  });

  const svg = `
  <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; display:block;" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="${W-2}" height="${H-2}" fill="white" stroke="#111" stroke-width="3"/>
    ${gridLines}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="#111" stroke-width="2"/>
    <line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#111" stroke-width="2"/>
    <path d="${linePath('sys')}" fill="none" stroke="#FF4FA0" stroke-width="3.5"/>
    <path d="${linePath('dia')}" fill="none" stroke="#3E7BFA" stroke-width="3.5"/>
    <path d="${linePath('hr')}"  fill="none" stroke="#33D17A" stroke-width="3.5"/>
    ${dots('sys','#FF4FA0')}
    ${dots('dia','#3E7BFA')}
    ${dots('hr','#33D17A')}
    ${xLabels}
  </svg>`;

  holder.innerHTML = svg;
}

function renderTable(){
  const holder = document.getElementById('tableHolder');
  if(data.length === 0){
    holder.innerHTML = `<div class="empty-state"><div class="big">🗒️</div>${T.tableEmpty}</div>`;
    return;
  }
  const sorted = [...data].sort((a,b)=>{
    const da = a.date + 'T' + a.time;
    const db = b.date + 'T' + b.time;
    return db.localeCompare(da);
  });

  const rows = sorted.map(m=>{
    const isHigh = m.sys >= 140 || m.dia >= 90;
    const badge = isHigh ? `<span class="badge high">${T.badgeHigh}</span>` : `<span class="badge ok">${T.badgeOk}</span>`;
    return `
      <tr>
        <td>${fmtDateLocal(m.date)}</td>
        <td>${m.time}</td>
        <td>${m.sys}</td>
        <td>${m.dia}</td>
        <td>${m.hr}</td>
        <td>${badge}</td>
        <td>
          <button class="icon-btn edit" title="${T.editTitle}" data-id="${m.id}">✏️</button>
          <button class="icon-btn del" title="${T.deleteIconTitle}" data-id="${m.id}">🗑️</button>
        </td>
      </tr>`;
  }).join('');

  holder.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>${T.thDate}</th>
            <th>${T.thTime}</th>
            <th>${T.thSys}</th>
            <th>${T.thDia}</th>
            <th>${T.thHr}</th>
            <th>${T.thStatus}</th>
            <th>${T.thActions}</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;

  holder.querySelectorAll('.icon-btn.edit').forEach(btn=>{
    btn.addEventListener('click', ()=> openEditForm(btn.dataset.id));
  });
  holder.querySelectorAll('.icon-btn.del').forEach(btn=>{
    btn.addEventListener('click', ()=> openDeleteConfirm(btn.dataset.id));
  });
}

function renderAll(){
  renderStats();
  renderChart();
  renderTable();
}

/* ---------------- Compact serialization ---------------- */
// date "YYYY-MM-DD" -> "YYYYMMDD", time "HH:MM" -> "HHMM", joined with | and records with ;
function serializeRecords(records){
  const sorted = [...records].sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time));
  return sorted.map(r => `${r.date.replace(/-/g,'')}|${r.time.replace(':','')}|${r.sys}|${r.dia}|${r.hr}`).join(';');
}
function deserializeRecords(str){
  if(!str) return [];
  return str.split(';').filter(Boolean).map(chunk=>{
    const parts = chunk.split('|');
    if(parts.length < 5) return null;
    const [d,t,sys,dia,hr] = parts;
    const date = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
    const time = `${t.slice(0,2)}:${t.slice(2,4)}`;
    return { date, time, sys:Number(sys), dia:Number(dia), hr:Number(hr) };
  }).filter(Boolean);
}

/* ---------------- Base64url helpers ---------------- */
function bufferToBase64Url(buf){
  let binary = '';
  const bytes = new Uint8Array(buf);
  for(let i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function base64UrlToBuffer(b64url){
  let b64 = b64url.replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length % 4) b64 += '=';
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

/* ---------------- Compression (native, no external library) ---------------- */
// Uses the browser's built-in CompressionStream (gzip) to avoid repetition in the URL.
// Falls back to plain encoding on browsers that lack it.
async function compressToToken(str){
  if(typeof CompressionStream !== 'undefined'){
    const stream = new Blob([str]).stream().pipeThrough(new CompressionStream('gzip'));
    const buf = await new Response(stream).arrayBuffer();
    return 'g' + bufferToBase64Url(buf);
  }
  return 'p' + bufferToBase64Url(new TextEncoder().encode(str).buffer);
}
async function decompressFromToken(token){
  const marker = token[0];
  const rest = token.slice(1);
  const buf = base64UrlToBuffer(rest);
  if(marker === 'g'){
    if(typeof DecompressionStream === 'undefined') throw new Error('gzip not supported');
    const stream = new Blob([buf]).stream().pipeThrough(new DecompressionStream('gzip'));
    return await new Response(stream).text();
  }
  return new TextDecoder().decode(buf);
}

/* ---------------- Share ---------------- */
const shareOverlay = document.getElementById('shareOverlay');

async function handleShare(){
  if(data.length === 0){
    showToast(LANG === 'it' ? 'Nessuna misurazione da condividere.' : 'No readings to share.');
    return;
  }
  const token = await compressToToken(serializeRecords(data));
  const url = `${location.origin}${location.pathname}#share=${token}`;

  const input = document.getElementById('shareUrlInput');
  input.value = url;
  document.getElementById('btnCopyShare').textContent = T.copyBtn;

  const countEl = document.getElementById('shareCharCount');
  const warn = url.length > 1900;
  countEl.textContent = T.charCount(url.length) + (warn ? ' — ' + T.charWarn : '');
  countEl.classList.toggle('warn', warn);

  shareOverlay.classList.add('show');

  try{
    await navigator.clipboard.writeText(url);
    document.getElementById('btnCopyShare').textContent = T.copiedBtn;
  }catch(e){ /* clipboard blocked, user can copy manually from the field */ }
}

document.getElementById('btnShare').addEventListener('click', handleShare);
document.getElementById('btnCloseShare').addEventListener('click', ()=> shareOverlay.classList.remove('show'));
shareOverlay.addEventListener('click', e=>{ if(e.target === shareOverlay) shareOverlay.classList.remove('show'); });
document.getElementById('btnCopyShare').addEventListener('click', async ()=>{
  const input = document.getElementById('shareUrlInput');
  input.select();
  try{
    await navigator.clipboard.writeText(input.value);
    document.getElementById('btnCopyShare').textContent = T.copiedBtn;
  }catch(e){
    document.execCommand('copy');
  }
});

/* ---------------- Import / merge from shared link ---------------- */
const importOverlay = document.getElementById('importOverlay');
let pendingConflicts = [];

function applyOverwrite(){
  pendingConflicts.forEach(c=>{
    const idx = data.findIndex(r=> r.id === c.local.id);
    if(idx > -1){
      data[idx] = { ...data[idx], sys: c.incoming.sys, dia: c.incoming.dia, hr: c.incoming.hr };
    }
  });
  saveData(data);
  showToast(T.toastOverwritten(pendingConflicts.length));
  pendingConflicts = [];
  importOverlay.classList.remove('show');
  renderAll();
}
function applyKeepMine(){
  showToast(T.toastKept);
  pendingConflicts = [];
  importOverlay.classList.remove('show');
  renderAll();
}
document.getElementById('btnOverwriteMine').addEventListener('click', applyOverwrite);
document.getElementById('btnKeepMine').addEventListener('click', applyKeepMine);
importOverlay.addEventListener('click', e=>{ if(e.target === importOverlay) applyKeepMine(); });

async function checkForSharedData(){
  const hash = location.hash;
  if(!hash || hash.indexOf('#share=') !== 0) return;
  const token = hash.slice('#share='.length);

  let incoming;
  try{
    const str = await decompressFromToken(decodeURIComponent(token));
    incoming = deserializeRecords(str);
  }catch(e){
    console.error('Could not read shared data', e);
    return;
  }
  // clean the URL right away so a refresh doesn't re-trigger the import
  history.replaceState(null, '', location.pathname + location.search);

  if(!incoming || incoming.length === 0) return;

  const localByKey = new Map(data.map(r=>[r.date+'T'+r.time, r]));
  const newOnes = [];
  const conflicts = [];

  incoming.forEach(inc=>{
    const key = inc.date+'T'+inc.time;
    const local = localByKey.get(key);
    if(!local){
      newOnes.push(inc);
    } else if(local.sys !== inc.sys || local.dia !== inc.dia || local.hr !== inc.hr){
      conflicts.push({ local, incoming: inc });
    }
  });

  newOnes.forEach(inc=>{
    data.push({ id: uid(), date: inc.date, time: inc.time, sys: inc.sys, dia: inc.dia, hr: inc.hr });
  });
  if(newOnes.length > 0) saveData(data);

  if(conflicts.length > 0){
    pendingConflicts = conflicts;
    document.getElementById('t_importBody').textContent = T.importBody(newOnes.length, conflicts.length);
    importOverlay.classList.add('show');
    renderAll();
  } else if(newOnes.length > 0){
    showToast(T.toastAdded(newOnes.length));
    renderAll();
  }
}

applyStaticStrings();
renderAll();
checkForSharedData();
